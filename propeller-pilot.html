<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propeller Pilot - The Arcade</title>

    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Base Page Styles */
        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header & Titles */
        header {
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Monoton', cursive;
            font-size: 3.5rem;
            font-weight: normal;
            margin: 0;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #00ffff;
        }

        /* Game Information Section */
        .game-info {
            max-width: 800px;
            background-color: #111;
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            line-height: 1.6;
        }

        .game-info h2 {
            font-size: 1rem;
            color: #00ffff;
            margin-top: 0;
        }

        .game-info p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            margin: 0;
        }

        /* Game Interface Area */
        .arcade-cabinet {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            padding: 20px;
            border: 3px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 20px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.2);
        }

        /* The Canvas to draw the game */
        canvas {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 5px;
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.1);
            max-width: 100%;
        }

        /* UI (Score and Buttons) */
        .ui-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        .score-board {
            font-size: 1.2rem;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        /* Neon Buttons */
        .btn {
            background-color: transparent;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            border: 2px solid #00ffff;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .btn:hover {
            background-color: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        .btn-return {
            margin-top: 40px;
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .btn-return:hover {
            background-color: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px #ff00ff;
        }
    </style>
</head>
<body>

    <header>
        <h1>PROPELLER PILOT</h1>
    </header>

    <main>
        <section class="game-info">
            <h2>MISSION BRIEFING</h2>
            <p>Control your drone and navigate through gaps in a series of obstacles. Use the Spacebar to calculate upward thrust vectors and fight gravity. Avoid collisions at all costs!</p>
        </section>

        <section class="arcade-cabinet">
            <canvas id="propeller-canvas" width="800" height="400">
                Your browser does not support the HTML5 canvas tag.
            </canvas>
            
            <div class="ui-panel">
                <div class="score-board">SCORE: <span id="score">0000</span></div>
                <button id="thrustBtn" class="btn">THRUST</button>
            </div>
        </section>
        <br>
        <br>
        <a href="index.html" class="btn btn-return">RETURN TO MENU</a>
    </main>
    <script src="js/propeller.js"></script>
</body>
</html>
