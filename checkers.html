<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers - The Arcade</title>

    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Base Style */
        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Header and Titles */
        header {
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Monoton', cursive;
            font-size: 3.5rem;
            font-weight: normal;
            margin: 0;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff007f,
                0 0 40px #ff007f,
                0 0 80px #ff007f;
        }

        /* Game Info Section */
        .game-info {
            max-width: 800px;
            background-color: #111;
            border: 1px solid #ff007f;
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            line-height: 1.6;
        }

        .game-info h2 {
            font-size: 1rem;
            color: #ff007f;
            margin-top: 0;
        }

        .game-info p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            margin: 0;
        }

        /* Interface Area */
        .arcade-cabinet {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            padding: 20px;
            border: 3px solid #ff007f;
            border-radius: 15px;
            box-shadow: 0 0 20px #ff007f, inset 0 0 15px rgba(255, 0, 127, 0.2);
            width: 100%;
            max-width: 900px;
            gap: 20px;
            box-sizing: border-box;
        }

        /* --- CSS GRID CHECKERS BOARD --- */
        .checkers-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1; /* board square */
            border: 4px solid #fff;
            box-shadow: 0 0 15px #ff007f;
            background-color: #222;
        }

        /* Alternating Square Colors */
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .square.dark {
            background-color: #111;
        }

        .square.light {
            background-color: #ff007f;
            opacity: 0.3;
        }

        /* Checkers Pieces */
        .piece {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .piece:hover {
            transform: scale(1.1);
        }

        /* Player 1 (Neon Cyan) */
        .player1 {
            background-color: #00ffff;
            border: 2px solid #fff;
            box-shadow: 0 0 10px #00ffff, inset 0 0 5px #fff;
        }

        /* Player 2 (Neon Pink) */
        .player2 {
            background-color: #ff00ff;
            border: 2px solid #fff;
            box-shadow: 0 0 10px #ff00ff, inset 0 0 5px #fff;
        }

        .turn-indicator {
            font-size: clamp(0.65rem, 1.85vw, 0.85rem);
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            line-height: 1.35;
        }

        /* Neon Buttons */
        .btn {
            background-color: transparent;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.65rem, 1.85vw, 0.75rem);
            border: 2px solid #ff007f;
            padding: 14px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            margin: 0;
            box-sizing: border-box;
            line-height: 1.35;
            text-align: center;
        }

        .btn:hover {
            background-color: #ff007f;
            color: #000;
            box-shadow: 0 0 20px #ff007f;
        }

        .cabinet-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 12px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .cabinet-actions .btn {
            flex: 1 1 240px;
            min-width: min(100%, 200px);
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 3.25rem;
        }

        .cabinet-actions .turn-indicator {
            flex: 1 1 240px;
            min-width: min(100%, 200px);
            max-width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 3.25rem;
            text-align: center;
        }

        .btn-return {
            margin-top: 28px;
            max-width: min(100%, 900px);
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn-return:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        /* --- King Piece Styling --- */
        .piece.king {
            border: 3px solid #ffd700;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .piece.player1.king {
            box-shadow: 0 0 15px #ffd700, inset 0 0 15px #00ffff;
        }

        .piece.player2.king {
            box-shadow: 0 0 15px #ffd700, inset 0 0 15px #ff00ff;
        }

        .piece.king::after {
            content: 'K';
            color: #ffd700;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #000;
        }

    </style>
</head>
<body>

    <header>
        <h1>CHECKERS</h1>
    </header>

    <main>
        <section class="game-info">
            <h2>MISSION BRIEFING</h2>
            <p>A neon-infused 8x8 Checkers game. Face off against an opponent by moving your pieces diagonally. Mandatory jumps and strict game rules are enforced. Get your piece to the opposite side to be "Kinged"!</p>
        </section>

        <section class="arcade-cabinet">
            
            <div class="checkers-board">
                <div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div>
                <div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div>
                <div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div><div class="square light"></div><div class="square dark"><div class="piece player2"></div></div>
                <div class="square dark"></div><div class="square light"></div><div class="square dark"></div><div class="square light"></div><div class="square dark"></div><div class="square light"></div><div class="square dark"></div><div class="square light"></div>
                <div class="square light"></div><div class="square dark"></div><div class="square light"></div><div class="square dark"></div><div class="square light"></div><div class="square dark"></div><div class="square light"></div><div class="square dark"></div>
                <div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div>
                <div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div>
                <div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div><div class="square dark"><div class="piece player1"></div></div><div class="square light"></div>
            </div>

            <div class="cabinet-actions">
                <div class="turn-indicator">> P1 TURN</div>
                <button type="button" id="resetBtn" class="btn">RESET BOARD</button>
            </div>
        </section>

        <a href="index.html" class="btn btn-return">RETURN TO MENU</a>
    </main>
    <script src="js/checkers.js"></script>
</body>
</html>
